apiVersion: apps/v1
kind: Deployment
metadata:
  name: riesgo-service
  labels:
    app: riesgo-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: riesgo-service
  template:
    metadata:
      labels:
        app: riesgo-service
    spec:
      containers:
      - name: riesgo-service
        image: riesgo-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: NOTIFICACION_SERVICE_URL
          value: "http://notificacion-service:8081"
        livenessProbe:
          httpGet:
            path: /api/estudiantes/health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/estudiantes/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: riesgo-service
spec:
  type: NodePort
  selector:
    app: riesgo-service
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
