server.port=8081
spring.application.name=notificacion-service

# Persistencia propia del servicio (autonomía de datos — H2 archivo local)
spring.datasource.url=jdbc:h2:file:./data/notificaciones;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=false

# Tracing distribuido (mismo OTLP que riesgo-service → trazas completas en Jaeger)
management.tracing.sampling.probability=1.0
otel.exporter.otlp.endpoint=http://localhost:4318
otel.service.name=notificacion-service
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] trace=%X{traceId:-} span=%X{spanId:-} %-5level %logger{36} - %msg%n

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
