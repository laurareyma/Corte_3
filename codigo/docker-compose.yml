version: '3.8'

services:

  # ✅ Prometheus: recolecta métricas de ambos servicios
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - sabana-net

  # ✅ Grafana: visualiza las métricas de Prometheus
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    depends_on:
      - prometheus
    networks:
      - sabana-net

  # ✅ Jaeger: tracing distribuido (UI + OTLP collector)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"   # UI de Jaeger
      - "4318:4318"     # OTLP HTTP (usado por riesgo-service)
      - "6831:6831/udp" # Jaeger agent UDP
    networks:
      - sabana-net

networks:
  sabana-net:
    driver: bridge
