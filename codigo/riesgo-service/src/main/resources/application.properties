server.port=8080
spring.application.name=riesgo-service

# URL del notificacion-service (cada servicio configura sus propios endpoints — autonomía operativa)
notificacion.service.url=http://localhost:8081

# Timeouts a nivel de cliente HTTP (RestTemplate); alineados con resilience4j.timelimiter
http.client.connect-timeout-ms=2000
http.client.read-timeout-ms=5000

# JWT
jwt.secret=clave-super-secreta-sabana-2024-debe-ser-larga-minimo-32-chars

# Actuator (Prometheus)
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Tracing (Jaeger via OTLP)
management.tracing.sampling.probability=1.0
otel.exporter.otlp.endpoint=http://localhost:4318
otel.service.name=riesgo-service
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] trace=%X{traceId:-} span=%X{spanId:-} %-5level %logger{36} - %msg%n

# Resilience4j - Circuit Breaker
resilience4j.circuitbreaker.instances.notificacionService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.notificacionService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.notificacionService.sliding-window-size=5
resilience4j.circuitbreaker.instances.notificacionService.permitted-number-of-calls-in-half-open-state=2

# Resilience4j - Retry
resilience4j.retry.instances.notificacionService.max-attempts=3
resilience4j.retry.instances.notificacionService.wait-duration=2s

# Resilience4j - TimeLimiter (cubre la ejecución asíncrona del cliente; ver NotificacionClient)
resilience4j.timelimiter.instances.notificacionService.timeout-duration=5s
resilience4j.timelimiter.instances.notificacionService.cancelRunningFuture=true
